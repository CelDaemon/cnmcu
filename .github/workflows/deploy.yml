name: Deploy project
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    needs: natives
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Download natives
        uses: actions/download-artifact@v8
        with:
          path: prebuilt
          pattern: natives-*
          merge-multiple: true

      - name: Build project
        run: ./gradlew --no-daemon -P prebuilt_natives=prebuilt :build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: |
            build/libs/
            !build/libs/*-sources.jar
            !build/libs/*-all.jar

  natives:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest, ubuntu-24.04-arm, windows-11-arm ]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup java
        if: matrix.os != 'windows-11-arm'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Retrieve Windows ARM java from cache
        id: java-cache
        if: matrix.os == 'windows-11-arm'
        uses: actions/cache@v5
        with:
          key: win-arm-java-25
          path: jdk.zip
      - name: Setup java on Windows ARM
        if: matrix.os == 'windows-11-arm' && steps.java-cache.outputs.cache-hit != 'true'
        run: Invoke-WebRequest -OutFile jdk.zip https://aka.ms/download-jdk/microsoft-jdk-25.0.2-windows-aarch64.zip
      - name: Setup java on Windows ARM
        if: matrix.os == 'windows-11-arm'
        uses: actions/setup-java@v5
        with:
          distribution: jdkfile
          jdkFile: jdk.zip
          java-version: 25

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build natives
        run: ./gradlew --no-daemon :natives:assemble

      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          path: natives/build/bin/*
          name: natives-${{ matrix.os }}
