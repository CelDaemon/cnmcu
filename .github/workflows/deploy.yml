name: Deploy project
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    needs: natives
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Download natives
        uses: actions/download-artifact@v7
        with:
          path: prebuilt
          pattern: natives-*
          merge-multiple: true

      - name: Build project
        run: ./gradlew --no-daemon -P prebuilt_natives=prebuilt :build

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          path: |
            build/libs/
            !build/libs/*-sources.jar
            !build/libs/*-all.jar

  natives:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest, ubuntu-24.04-arm, windows-11-arm ]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup java
        if: matrix.os != 'windows-11-arm'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Download java on Windows ARM
        if: matrix.os == 'windows-11-arm'
        run: curl -L https://aka.ms/download-jdk/microsoft-jdk-25.0.2-windows-aarch64.zip -o jdk.zip
      - name: Extract java
        if: matrix.os == 'windows-11-arm'
        run: Expand-Archive -DestinationPath $(Get-Location) jdk.zip
      - name: Add java to path
        if: matrix.os == 'windows-11-arm'
        run: echo "JAVA_HOME=$(Resolve-Path jdk-25.0.2+10)" >> "$ENV:GITHUB_ENV"

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build natives
        run: ./gradlew --no-daemon :natives:assemble

      - name: Upload natives
        uses: actions/upload-artifact@v6
        with:
          path: natives/build/bin/*
          name: natives-${{ matrix.os }}
